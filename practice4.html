    <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRACTICE 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color:white;
        }

        .parent {
            height: 100vh;
            width: 100%;
            border: 2px solid black;
        }

        .header_area {
            height: 10vh;
            width: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .content_area {
            height: 80vh;
            width: 100%;
            background-color: rgb(240, 231, 231);
            display: flex;
            justify-content: center;
            align-items: center;
            gap:30px;
        }

        .footer_area {
            height: 10vh;
            width: 100%;
            background-color: rgb(0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .div1 {
            background-color: rgba(255, 0, 0, 0.5);
            height: 140px;
            width: 140px;
        }

        .div2 {
            background-color: rgba(71, 103, 209, 0.5);
            height: 140px;
            width: 140px;
        }

        .div3 {
            background-color: rgba(107, 238, 46, 0.5);
            height: 140px;
            width: 140px;

        }
        .dibba{
            margin: 20px;
            color: rgb(252, 252, 252);
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="header_area">
            <div class="dibba"><a href="#">Home</a></div>
            <div class="dibba"><a href="#">About</a></div>
            <div class="dibba"><a href="#">Contact </a></div>
        </div>
        <div class="content_area">
            <div class="div1"></div>
            <div class="div2"></div>
            <div class="div3"></div>

        </div>
        <div class="footer_area">
            <a href="#">Footer</a>
        </div>
    </div>
</body>

</html>
