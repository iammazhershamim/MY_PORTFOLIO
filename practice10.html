    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Georgia, 'Times New Roman', Times, serif;
            cursor: pointer;
        }

        h1 {
            margin-top: 20px;
            text-align: center;
            color: #0d0c22;
            padding: 10px;
        }

        p {
            text-align: center;
            margin-top: 20px;

            padding: 10px;
        }

        .heading_a {
            text-decoration: none;
            color: black;
            padding: 10px;
        }

        .heading_a:hover {
            color: #6d6c79;
        }

        .conatainer {
            height: 300px;
            gap: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);

            margin-top: 20px;
            margin-left: 30px;
            margin-right: 30px;

        }

        .child {

            border-radius: 10px;
            height: 100%;
            width: 100%;
            display: flex;
            object-fit: contain;

        }

        .mini_child_parent {
            height: 50px;
            width: 96%;

            /* margin-right: 40px; */

            display: grid;
            justify-content: center;
            grid-template-columns: repeat(4, 1fr);
        }

        .mini_parent_2 {}

        .mini_parent_2 {
            display: flex;
            flex-direction: rows;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .mini_child_1 {
            height: 10px;
        }

        .mini_child_2 {
            background-color: #acacb0;
            color: aliceblue;
        }

        .mini_child_2:hover {
            background-color: #4d4d60;
            cursor: pointer;
        }
        .mini_child_3:hover{
            background-color: fuchsia;
            cursor: pointer;
        }
    </style>
</head>
